<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Tally Counter</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <script src="/apps/_register-sw.js" defer></script>
  <style>
    :root{--bg:#f1f5f9;--fg:#0f172a;--card:#fff;--border:#e2e8f0;--accent:#4f46e5;--muted:#64748b}
    @media (prefers-color-scheme:dark){:root{--bg:#0f172a;--fg:#e2e8f0;--card:#1e293b;--border:#334155;--accent:#818cf8;--muted:#94a3b8}}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh}
    .bar{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border)}
    .bar a{color:var(--accent);text-decoration:none;font-size:15px}.bar h1{font-size:16px;margin:0;flex:1}
    .bar button{font-size:13px;padding:7px 12px;border-radius:10px;border:0;background:var(--accent);color:#fff}
    main{max-width:480px;margin:0 auto;padding:14px;display:flex;flex-direction:column;gap:14px}
    .counter{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px}
    .ctop{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .ctop input{font-size:16px;font-weight:600;border:0;background:none;color:var(--fg);width:60%}
    .ctop button{border:0;background:none;color:var(--muted);font-size:18px}
    .val{text-align:center;font-size:52px;font-weight:700;margin:6px 0}
    .btns{display:flex;gap:10px}
    .btns button{flex:1;padding:18px;font-size:24px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--fg)}
    .btns .plus{background:var(--accent);color:#fff;border-color:var(--accent)}
  </style>
</head>
<body>
  <div class="bar"><a href="index.html">← Apps</a><h1>🔢 Tally</h1><button id="add">+ Counter</button></div>
  <main id="list"></main>

  <script>
    const KEY = "miniapps.tally";
    let counters = JSON.parse(localStorage.getItem(KEY) || "null") || [{ id: Date.now(), name: "Counter 1", value: 0 }];
    const save = () => localStorage.setItem(KEY, JSON.stringify(counters));
    const esc = s => s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));

    function render(){
      const list = document.getElementById("list"); list.innerHTML = "";
      counters.forEach(c => {
        const div = document.createElement("div"); div.className = "counter";
        div.innerHTML = `<div class="ctop"><input value="${esc(c.name)}"><button title="Delete">🗑</button></div>
          <div class="val">${c.value}</div>
          <div class="btns"><button class="minus">−</button><button class="plus">＋</button></div>`;
        div.querySelector("input").onchange = e => { c.name = e.target.value; save(); };
        div.querySelector(".ctop button").onclick = () => { if (confirm("Delete this counter?")){ counters = counters.filter(x => x.id !== c.id); save(); render(); } };
        div.querySelector(".plus").onclick = () => { c.value++; save(); render(); navigator.vibrate && navigator.vibrate(10); };
        div.querySelector(".minus").onclick = () => { c.value--; save(); render(); };
        list.appendChild(div);
      });
    }
    document.getElementById("add").onclick = () => { counters.push({ id: Date.now(), name: "Counter " + (counters.length+1), value: 0 }); save(); render(); };
    render();
  </script>
</body>
</html>
