<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Countdown Timer</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <script src="/apps/_register-sw.js" defer></script>
  <style>
    :root{--bg:#f1f5f9;--fg:#0f172a;--card:#fff;--border:#e2e8f0;--accent:#7c3aed;--muted:#64748b}
    @media (prefers-color-scheme:dark){:root{--bg:#0f172a;--fg:#e2e8f0;--card:#1e293b;--border:#334155;--accent:#a78bfa;--muted:#94a3b8}}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;text-align:center}
    .bar{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border);text-align:left}
    .bar a{color:var(--accent);text-decoration:none;font-size:15px}.bar h1{font-size:16px;margin:0;flex:1}
    main{max-width:420px;margin:0 auto;padding:20px 16px}
    .display{font-size:60px;font-weight:700;font-variant-numeric:tabular-nums;margin:10px 0 4px}
    .display.alarm{color:var(--accent);animation:flash .6s infinite}
    @keyframes flash{50%{opacity:.3}}
    .pick{display:flex;justify-content:center;gap:6px;align-items:center;font-size:22px;margin:18px 0}
    .pick input{width:64px;padding:10px;font-size:22px;text-align:center;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--fg)}
    .pick span{color:var(--muted);font-size:14px}
    .presets{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:14px 0}
    .presets button{padding:9px 14px;border-radius:999px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-size:13px}
    .row{display:flex;gap:10px;justify-content:center;margin:18px 0}
    .row button{font-size:18px;padding:14px 26px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--fg);min-width:110px}
    .row button.go{background:var(--accent);color:#fff;border-color:var(--accent)}
  </style>
</head>
<body>
  <div class="bar"><a href="index.html">← Apps</a><h1>⏲️ Countdown</h1></div>
  <main>
    <div class="display" id="display">00:00:00</div>
    <div class="pick" id="pick">
      <div><input id="h" type="number" min="0" max="99" value="0"><br><span>hrs</span></div>:
      <div><input id="m" type="number" min="0" max="59" value="5"><br><span>min</span></div>:
      <div><input id="s" type="number" min="0" max="59" value="0"><br><span>sec</span></div>
    </div>
    <div class="presets">
      <button data-s="60">1 min</button><button data-s="300">5 min</button>
      <button data-s="600">10 min</button><button data-s="1500">25 min</button>
    </div>
    <div class="row"><button class="go" id="start">Start</button><button id="reset">Reset</button></div>
  </main>

  <script>
    let remaining = 0, running = false, timer = null;
    const display = document.getElementById("display"), pick = document.getElementById("pick");

    function fromInputs(){
      const h = +document.getElementById("h").value||0, m = +document.getElementById("m").value||0, s = +document.getElementById("s").value||0;
      return h*3600 + m*60 + s;
    }
    function fmt(t){ const h = Math.floor(t/3600), m = Math.floor(t%3600/60), s = t%60;
      return [h,m,s].map(n => String(n).padStart(2,"0")).join(":"); }
    function render(){ display.textContent = fmt(remaining); }

    function beep(){
      try { const a = new (window.AudioContext||window.webkitAudioContext)();
        [0,.25,.5].forEach(off => { const o = a.createOscillator(), g = a.createGain();
          o.frequency.value = 880; o.connect(g).connect(a.destination);
          g.gain.setValueAtTime(.4,a.currentTime+off); o.start(a.currentTime+off); o.stop(a.currentTime+off+.18);
          g.gain.exponentialRampToValueAtTime(.001,a.currentTime+off+.18); }); } catch {}
    }
    function tick(){
      remaining--;
      if (remaining <= 0){ remaining = 0; clearInterval(timer); running = false; document.getElementById("start").textContent = "Start";
        display.classList.add("alarm"); beep(); navigator.vibrate && navigator.vibrate([300,150,300]); }
      render();
    }
    document.getElementById("start").onclick = (e) => {
      display.classList.remove("alarm");
      if (running){ clearInterval(timer); running = false; e.target.textContent = "Start"; return; }
      if (remaining <= 0) remaining = fromInputs();
      if (remaining <= 0) return;
      pick.style.display = "none"; running = true; e.target.textContent = "Pause"; timer = setInterval(tick, 1000); render();
    };
    document.getElementById("reset").onclick = () => {
      clearInterval(timer); running = false; remaining = 0; display.classList.remove("alarm");
      pick.style.display = ""; document.getElementById("start").textContent = "Start"; render();
    };
    document.querySelectorAll(".presets button").forEach(b => b.onclick = () => {
      const total = +b.dataset.s;
      document.getElementById("h").value = Math.floor(total/3600);
      document.getElementById("m").value = Math.floor(total%3600/60);
      document.getElementById("s").value = total%60;
    });

    render();
  </script>
</body>
</html>
