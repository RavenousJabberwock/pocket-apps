<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Metronome</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <script src="/apps/_register-sw.js" defer></script>
  <style>
    :root{--bg:#0f172a;--fg:#e2e8f0;--card:#1e293b;--border:#334155;--accent:#38bdf8;--muted:#94a3b8}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh}
    .bar{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border)}
    .bar a{color:var(--accent);text-decoration:none;font-size:15px}.bar h1{font-size:16px;margin:0;flex:1}
    main{max-width:420px;margin:0 auto;padding:20px 16px;text-align:center}
    .bpm{font-size:64px;font-weight:700;margin:6px 0 0}
    .bpm small{font-size:18px;color:var(--muted);font-weight:400}
    .beats{display:flex;justify-content:center;gap:10px;margin:18px 0}
    .dot{width:18px;height:18px;border-radius:50%;background:var(--border)}
    .dot.on{background:var(--accent)}.dot.accent.on{background:#f43f5e}
    input[type=range]{width:100%;margin:14px 0}
    .row{display:flex;gap:10px;justify-content:center;margin:14px 0;flex-wrap:wrap}
    button{font-size:16px;padding:12px 18px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--fg)}
    button.play{background:var(--accent);border-color:var(--accent);color:#06283d;min-width:120px;font-weight:600}
    select{font-size:15px;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--fg)}
    label{color:var(--muted);font-size:13px}
  </style>
</head>
<body>
  <div class="bar"><a href="index.html">← Apps</a><h1>🎵 Metronome</h1></div>
  <main>
    <div class="bpm"><span id="bpmVal">100</span> <small>BPM</small></div>
    <div class="beats" id="beats"></div>
    <input type="range" id="bpm" min="30" max="240" value="100" />
    <div class="row">
      <button id="minus">−5</button>
      <button class="play" id="play">▶ Start</button>
      <button id="plus">+5</button>
    </div>
    <div class="row">
      <label>Time signature
        <select id="sig">
          <option value="4">4/4</option><option value="3">3/4</option>
          <option value="2">2/4</option><option value="6">6/8</option>
        </select>
      </label>
      <button id="tap">Tap tempo</button>
    </div>
  </main>

  <script>
    let ctx, bpm = 100, beats = 4, current = 0, playing = false, timer = null;
    const bpmInput = document.getElementById("bpm");

    function audio(){ return ctx || (ctx = new (window.AudioContext||window.webkitAudioContext)()); }
    // Short click tone; accent = higher pitch on beat 1.
    function click(accent){
      const a = audio(), o = a.createOscillator(), g = a.createGain(), t = a.currentTime;
      o.frequency.value = accent ? 1500 : 900;
      g.gain.setValueAtTime(.6, t); g.gain.exponentialRampToValueAtTime(.001, t + .05);
      o.connect(g).connect(a.destination); o.start(t); o.stop(t + .05);
    }

    function buildDots(){
      const box = document.getElementById("beats"); box.innerHTML = "";
      for (let i = 0; i < beats; i++){
        const d = document.createElement("div");
        d.className = "dot" + (i === 0 ? " accent" : "");
        box.appendChild(d);
      }
    }
    function tick(){
      const dots = document.querySelectorAll(".dot");
      dots.forEach(d => d.classList.remove("on"));
      dots[current] && dots[current].classList.add("on");
      click(current === 0);
      current = (current + 1) % beats;
    }
    function schedule(){ clearInterval(timer); timer = setInterval(tick, 60000 / bpm); }

    function setBpm(v){
      bpm = Math.max(30, Math.min(240, v));
      bpmInput.value = bpm; document.getElementById("bpmVal").textContent = bpm;
      if (playing) schedule();
    }

    bpmInput.oninput = () => setBpm(+bpmInput.value);
    document.getElementById("plus").onclick = () => setBpm(bpm + 5);
    document.getElementById("minus").onclick = () => setBpm(bpm - 5);
    document.getElementById("sig").onchange = e => { beats = +e.target.value; current = 0; buildDots(); };

    document.getElementById("play").onclick = (e) => {
      audio().resume(); playing = !playing;
      if (playing){ current = 0; tick(); schedule(); e.target.textContent = "⏸ Stop"; }
      else { clearInterval(timer); e.target.textContent = "▶ Start"; document.querySelectorAll(".dot").forEach(d=>d.classList.remove("on")); }
    };

    // Tap tempo: average interval of last few taps.
    let taps = [];
    document.getElementById("tap").onclick = () => {
      const now = performance.now();
      taps = taps.filter(t => now - t < 2000); taps.push(now);
      if (taps.length >= 2){
        const diffs = taps.slice(1).map((t,i) => t - taps[i]);
        const avg = diffs.reduce((a,b)=>a+b,0) / diffs.length;
        setBpm(Math.round(60000 / avg));
      }
    };

    buildDots();
  </script>
</body>
</html>
