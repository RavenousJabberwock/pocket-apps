<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <title>Scientific Calculator</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <script src="/apps/_register-sw.js" defer></script>
  <style>
    :root{--bg:#f1f5f9;--fg:#0f172a;--card:#fff;--border:#e2e8f0;--accent:#0ea5e9;--muted:#64748b;--key:#fff;--fn:#e0f2fe}
    @media (prefers-color-scheme:dark){:root{--bg:#0f172a;--fg:#e2e8f0;--card:#1e293b;--border:#334155;--accent:#38bdf8;--muted:#94a3b8;--key:#1e293b;--fn:#0c344a}}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
    body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;display:flex;flex-direction:column}
    .bar{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border)}
    .bar a{color:var(--accent);text-decoration:none;font-size:15px}.bar h1{font-size:16px;margin:0;flex:1}
    .bar button{font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--fg)}
    main{max-width:480px;width:100%;margin:0 auto;padding:12px;flex:1;display:flex;flex-direction:column}
    .disp{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:right;margin-bottom:10px}
    .expr{color:var(--muted);font-size:13px;min-height:16px;word-break:break-all}
    .val{font-size:32px;font-weight:600;word-break:break-all}
    .keys{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
    button.k{font-size:17px;border-radius:11px;border:1px solid var(--border);background:var(--key);color:var(--fg);padding:14px 0}
    button.k:active{transform:scale(.95)}
    .fn{background:var(--fn);color:var(--accent);font-size:14px}
    .eq{background:var(--accent);color:#fff;border-color:var(--accent)}
  </style>
</head>
<body>
  <div class="bar"><a href="index.html">← Apps</a><h1>🔬 Scientific</h1><button id="mode">DEG</button></div>
  <main>
    <div class="disp"><div class="expr" id="expr">&nbsp;</div><div class="val" id="val">0</div></div>
    <div class="keys" id="keys"></div>
  </main>

  <script>
    // This calculator builds an expression string and evaluates it safely with a
    // small tokenizer/parser (no eval). Angle mode toggles DEG/RAD for trig.
    let expr = "", deg = true;
    const valEl = document.getElementById("val"), exprEl = document.getElementById("expr");

    const layout = [
      ["sin","cos","tan","(",")"],
      ["asin","acos","atan","^","√"],
      ["ln","log","π","e","%"],
      ["7","8","9","÷","C"],
      ["4","5","6","×","⌫"],
      ["1","2","3","−","!"],
      ["0",".","EXP","+","="],
    ];
    const keys = document.getElementById("keys");
    layout.flat().forEach(k => {
      const b = document.createElement("button"); b.className = "k"; b.textContent = k;
      if (!/[0-9.]/.test(k) && !"÷×−+".includes(k) && k!=="=") b.classList.add("fn");
      if (k === "=") b.classList.add("eq");
      b.onclick = () => press(k); keys.appendChild(b);
    });

    document.getElementById("mode").onclick = (e) => { deg = !deg; e.target.textContent = deg ? "DEG" : "RAD"; };

    function press(k){
      if (k === "C"){ expr = ""; }
      else if (k === "⌫"){ expr = expr.slice(0, -1); }
      else if (k === "="){ return evaluate(); }
      else if (k === "π"){ expr += "π"; }
      else if (k === "e"){ expr += "e"; }
      else if (k === "√"){ expr += "√("; }
      else if (["sin","cos","tan","asin","acos","atan","ln","log"].includes(k)){ expr += k + "("; }
      else if (k === "EXP"){ expr += "E"; }
      else if (k === "!"){ expr += "!"; }
      else { expr += k; }
      render();
    }
    function render(){ exprEl.innerHTML = display(expr) || "&nbsp;"; }
    function display(s){ return s.replace(/\*/g,"×").replace(/\//g,"÷"); }

    // ---- Tokenize -> Shunting-yard -> RPN evaluate ----
    function evaluate(){
      try {
        const result = calc(expr);
        valEl.textContent = formatNum(result);
        expr = formatNum(result);
        render();
      } catch { valEl.textContent = "Error"; }
    }
    function formatNum(n){
      if (!isFinite(n)) return "Error";
      return parseFloat(n.toPrecision(12)).toString();
    }
    function calc(input){
      // Normalize symbols.
      let s = input.replace(/×/g,"*").replace(/÷/g,"/").replace(/−/g,"-").replace(/√/g,"sqrt");
      const toRad = x => deg ? x * Math.PI / 180 : x;
      const fromTrig = x => deg ? x * 180 / Math.PI : x;
      const funcs = {
        sin:x=>Math.sin(toRad(x)), cos:x=>Math.cos(toRad(x)), tan:x=>Math.tan(toRad(x)),
        asin:x=>fromTrig(Math.asin(x)), acos:x=>fromTrig(Math.acos(x)), atan:x=>fromTrig(Math.atan(x)),
        ln:Math.log, log:Math.log10, sqrt:Math.sqrt
      };
      const tokens = tokenize(s);
      const rpn = toRPN(tokens);
      return evalRPN(rpn, funcs);
    }
    function tokenize(s){
      const out = []; let i = 0;
      const isDigit = c => /[0-9.]/.test(c);
      while (i < s.length){
        const c = s[i];
        if (c === " "){ i++; continue; }
        if (isDigit(c)){ let n = ""; while (i < s.length && (isDigit(s[i]) || s[i]==="E" || ((s[i]==="+"||s[i]==="-") && s[i-1]==="E"))){ n += s[i++]; } out.push({t:"num", v: parseFloat(n.replace("E","e"))}); continue; }
        if (c === "π"){ out.push({t:"num", v: Math.PI}); i++; continue; }
        if (c === "e"){ out.push({t:"num", v: Math.E}); i++; continue; }
        if (/[a-z]/.test(c)){ let name = ""; while (i < s.length && /[a-z]/.test(s[i])) name += s[i++]; out.push({t:"func", v:name}); continue; }
        if ("+-*/^".includes(c)){
          // Unary minus handling.
          const prev = out[out.length-1];
          if (c === "-" && (!prev || prev.t === "op" || prev.v === "(")){ out.push({t:"num", v:0}); }
          out.push({t:"op", v:c}); i++; continue;
        }
        if (c === "!"){ out.push({t:"op", v:"!"}); i++; continue; }
        if (c === "("){ out.push({t:"lp"}); i++; continue; }
        if (c === ")"){ out.push({t:"rp"}); i++; continue; }
        throw "bad char";
      }
      return out;
    }
    const prec = {"+":1,"-":1,"*":2,"/":2,"^":4,"!":5};
    const rightAssoc = {"^":true};
    function toRPN(tokens){
      const out = [], ops = [];
      for (const tk of tokens){
        if (tk.t === "num") out.push(tk);
        else if (tk.t === "func") ops.push(tk);
        else if (tk.t === "op"){
          while (ops.length){
            const top = ops[ops.length-1];
            if (top.t === "func" || (top.t === "op" && (prec[top.v] > prec[tk.v] || (prec[top.v] === prec[tk.v] && !rightAssoc[tk.v])))){ out.push(ops.pop()); }
            else break;
          }
          ops.push(tk);
        }
        else if (tk.t === "lp") ops.push(tk);
        else if (tk.t === "rp"){
          while (ops.length && ops[ops.length-1].t !== "lp") out.push(ops.pop());
          ops.pop();
          if (ops.length && ops[ops.length-1].t === "func") out.push(ops.pop());
        }
      }
      while (ops.length) out.push(ops.pop());
      return out;
    }
    function fact(n){ if (n < 0 || n % 1) return NaN; let r = 1; for (let i=2;i<=n;i++) r *= i; return r; }
    function evalRPN(rpn, funcs){
      const st = [];
      for (const tk of rpn){
        if (tk.t === "num") st.push(tk.v);
        else if (tk.t === "func"){ st.push(funcs[tk.v](st.pop())); }
        else if (tk.t === "op"){
          if (tk.v === "!"){ st.push(fact(st.pop())); continue; }
          const b = st.pop(), a = st.pop();
          st.push(tk.v === "+" ? a+b : tk.v === "-" ? a-b : tk.v === "*" ? a*b : tk.v === "/" ? a/b : Math.pow(a,b));
        }
      }
      return st.pop();
    }
    render();
  </script>
</body>
</html>
