<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>BMI / BMR Calculator</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <script src="/apps/_register-sw.js" defer></script>
  <style>
    :root{--bg:#f1f5f9;--fg:#0f172a;--card:#fff;--border:#e2e8f0;--accent:#059669;--muted:#64748b}
    @media (prefers-color-scheme:dark){:root{--bg:#0f172a;--fg:#e2e8f0;--card:#1e293b;--border:#334155;--accent:#34d399;--muted:#94a3b8}}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh}
    .bar{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border)}
    .bar a{color:var(--accent);text-decoration:none;font-size:15px}.bar h1{font-size:16px;margin:0;flex:1}
    main{max-width:480px;margin:0 auto;padding:14px}
    .units{display:flex;gap:8px;margin-bottom:14px}
    .units button{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--fg)}
    .units button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
    .field input,.field select{width:100%;padding:12px;font-size:16px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--fg)}
    .two{display:flex;gap:10px}.two>div{flex:1}
    .result{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:14px}
    .result .num{font-size:30px;font-weight:700;color:var(--accent)}
    .result .cat{font-weight:600;margin:2px 0 10px}
    .result .line{display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--border);font-size:14px}
  </style>
</head>
<body>
  <div class="bar"><a href="index.html">← Apps</a><h1>⚖️ BMI / BMR</h1></div>
  <main>
    <div class="units">
      <button class="active" id="metric">Metric</button>
      <button id="imperial">Imperial</button>
    </div>
    <div class="field"><label>Weight (<span id="wU">kg</span>)</label><input id="weight" type="number" value="70"></div>
    <div class="field"><label>Height (<span id="hU">cm</span>)</label><input id="height" type="number" value="175"></div>
    <div class="two">
      <div class="field"><label>Age</label><input id="age" type="number" value="30"></div>
      <div class="field"><label>Sex</label><select id="sex"><option value="m">Male</option><option value="f">Female</option></select></div>
    </div>
    <div class="field"><label>Activity</label>
      <select id="activity">
        <option value="1.2">Sedentary</option>
        <option value="1.375">Light (1-3 days/wk)</option>
        <option value="1.55" selected>Moderate (3-5 days/wk)</option>
        <option value="1.725">Active (6-7 days/wk)</option>
        <option value="1.9">Very active</option>
      </select>
    </div>
    <div class="result">
      <div class="num" id="bmi">—</div>
      <div class="cat" id="cat"></div>
      <div class="line"><span>BMR (resting calories)</span><b id="bmr">—</b></div>
      <div class="line"><span>Daily calories (TDEE)</span><b id="tdee">—</b></div>
    </div>
  </main>

  <script>
    let metric = true;
    function setUnits(m){
      metric = m;
      document.getElementById("metric").classList.toggle("active", m);
      document.getElementById("imperial").classList.toggle("active", !m);
      document.getElementById("wU").textContent = m ? "kg" : "lb";
      document.getElementById("hU").textContent = m ? "cm" : "in";
      calc();
    }
    document.getElementById("metric").onclick = () => setUnits(true);
    document.getElementById("imperial").onclick = () => setUnits(false);

    function calc(){
      let w = parseFloat(document.getElementById("weight").value);
      let h = parseFloat(document.getElementById("height").value);
      const age = parseFloat(document.getElementById("age").value);
      const sex = document.getElementById("sex").value;
      const act = parseFloat(document.getElementById("activity").value);
      if (!w || !h || !age) return;
      // Convert imperial to metric for the formulas.
      const kg = metric ? w : w * 0.453592;
      const cm = metric ? h : h * 2.54;
      const m = cm / 100;
      const bmi = kg / (m*m);
      // Mifflin-St Jeor BMR.
      const bmr = 10*kg + 6.25*cm - 5*age + (sex === "m" ? 5 : -161);
      document.getElementById("bmi").textContent = "BMI " + bmi.toFixed(1);
      const cat = bmi < 18.5 ? "Underweight" : bmi < 25 ? "Normal weight" : bmi < 30 ? "Overweight" : "Obese";
      document.getElementById("cat").textContent = cat;
      document.getElementById("bmr").textContent = Math.round(bmr) + " kcal";
      document.getElementById("tdee").textContent = Math.round(bmr * act) + " kcal";
    }
    ["weight","height","age","sex","activity"].forEach(id => document.getElementById(id).addEventListener("input", calc));
    calc();
  </script>
</body>
</html>
