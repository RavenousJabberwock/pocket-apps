<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Text Editor</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <script src="/apps/_register-sw.js" defer></script>
  <style>
    :root{--bg:#f1f5f9;--fg:#0f172a;--card:#fff;--border:#e2e8f0;--accent:#6366f1;--muted:#64748b}
    @media (prefers-color-scheme:dark){:root{--bg:#0f172a;--fg:#e2e8f0;--card:#1e293b;--border:#334155;--accent:#818cf8;--muted:#94a3b8}}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;font-family:system-ui,sans-serif;background:var(--bg);color:var(--fg)}
    body{display:flex;flex-direction:column}
    .bar{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border)}
    .bar a{color:var(--accent);text-decoration:none;font-size:15px}
    .bar h1{font-size:16px;margin:0;flex:1}
    .bar button{font-size:13px;padding:7px 10px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--fg)}
    textarea{flex:1;width:100%;border:0;padding:16px;font-size:16px;line-height:1.6;resize:none;background:var(--bg);color:var(--fg);font-family:ui-monospace,Menlo,monospace}
    textarea:focus{outline:none}
    .status{padding:8px 14px;font-size:12px;color:var(--muted);background:var(--card);border-top:1px solid var(--border);display:flex;justify-content:space-between}
  </style>
</head>
<body>
  <div class="bar">
    <a href="index.html">← Apps</a><h1>📝 Editor</h1>
    <button id="clear">Clear</button>
    <button id="export">Export .txt</button>
  </div>
  <textarea id="ed" placeholder="Start typing… your text autosaves."></textarea>
  <div class="status"><span id="count">0 words · 0 chars</span><span id="saved">Saved</span></div>

  <script>
    const KEY = "miniapps.editor"; // localStorage key
    const ed = document.getElementById("ed");
    const count = document.getElementById("count");
    const saved = document.getElementById("saved");

    // Restore previous content on load.
    ed.value = localStorage.getItem(KEY) || "";

    // Update word/char count.
    function updateCount() {
      const t = ed.value;
      const words = t.trim() ? t.trim().split(/\s+/).length : 0;
      count.textContent = words + " words · " + t.length + " chars";
    }

    // Debounced autosave to localStorage.
    let timer;
    ed.addEventListener("input", () => {
      updateCount();
      saved.textContent = "Saving…";
      clearTimeout(timer);
      timer = setTimeout(() => {
        localStorage.setItem(KEY, ed.value);
        saved.textContent = "Saved";
      }, 400);
    });

    document.getElementById("clear").onclick = () => {
      if (confirm("Clear all text?")) { ed.value = ""; localStorage.removeItem(KEY); updateCount(); }
    };
    document.getElementById("export").onclick = () => {
      const blob = new Blob([ed.value], { type: "text/plain" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob); a.download = "note.txt"; a.click();
      URL.revokeObjectURL(a.href);
    };

    updateCount();
  </script>
</body>
</html>
