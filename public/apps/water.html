<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Water Tracker</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <script src="/apps/_register-sw.js" defer></script>
  <style>
    :root{--bg:#eff6ff;--fg:#0f172a;--card:#fff;--border:#bfdbfe;--accent:#2563eb;--muted:#1e40af}
    @media (prefers-color-scheme:dark){:root{--bg:#0a1222;--fg:#dbeafe;--card:#101d33;--border:#1e3a5f;--accent:#60a5fa;--muted:#93c5fd}}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;text-align:center}
    .bar{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border);text-align:left}
    .bar a{color:var(--accent);text-decoration:none;font-size:15px}.bar h1{font-size:16px;margin:0;flex:1}
    main{max-width:420px;margin:0 auto;padding:18px 16px}
    .ring{position:relative;width:200px;height:200px;margin:6px auto 0}
    svg{transform:rotate(-90deg)}
    .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .center b{font-size:34px}.center span{color:var(--muted);font-size:13px}
    .quick{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:20px 0}
    .quick button{padding:14px 18px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-size:15px}
    .quick button.go{background:var(--accent);color:#fff;border-color:var(--accent)}
    .goal{font-size:13px;color:var(--muted);margin:8px 0}
    .goal input{width:70px;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--fg)}
    .reset{border:0;background:none;color:var(--muted);font-size:13px;margin-top:10px}
  </style>
</head>
<body>
  <div class="bar"><a href="index.html">← Apps</a><h1>💧 Water</h1></div>
  <main>
    <div class="ring">
      <svg width="200" height="200"><circle cx="100" cy="100" r="88" fill="none" stroke="var(--border)" stroke-width="16"/><circle id="prog" cx="100" cy="100" r="88" fill="none" stroke="var(--accent)" stroke-width="16" stroke-linecap="round" stroke-dasharray="553" stroke-dashoffset="553"/></svg>
      <div class="center"><b id="amount">0</b><span>of <span id="goalText">2000</span> ml</span></div>
    </div>
    <div class="quick">
      <button class="go" data-ml="250">+250</button>
      <button class="go" data-ml="500">+500</button>
      <button data-ml="-250">−250</button>
    </div>
    <div class="goal">Daily goal: <input id="goal" type="number" value="2000"> ml</div>
    <button class="reset" id="reset">Reset today</button>
  </main>

  <script>
    const today = new Date().toISOString().slice(0,10);
    const KEY = "miniapps.water." + today, GKEY = "miniapps.water.goal";
    let total = +(localStorage.getItem(KEY) || 0);
    let goal = +(localStorage.getItem(GKEY) || 2000);
    const CIRC = 553; // 2*pi*88
    document.getElementById("goal").value = goal;

    function render(){
      document.getElementById("amount").textContent = total;
      document.getElementById("goalText").textContent = goal;
      const pct = Math.min(1, total/goal);
      document.getElementById("prog").style.strokeDashoffset = CIRC * (1 - pct);
    }
    function setTotal(v){ total = Math.max(0, v); localStorage.setItem(KEY, total); render(); }

    document.querySelectorAll(".quick button").forEach(b => b.onclick = () => setTotal(total + (+b.dataset.ml)));
    document.getElementById("goal").onchange = e => { goal = +e.target.value || 2000; localStorage.setItem(GKEY, goal); render(); };
    document.getElementById("reset").onclick = () => setTotal(0);
    render();
  </script>
</body>
</html>
