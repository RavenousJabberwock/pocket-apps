<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Mobile-first, allow safe-area on notched phones, prevent zoom jank -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Mini Apps Hub</title>
  <meta name="description" content="A collection of simple, offline-capable mobile web apps." />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/app-icon.png" />
  <script src="/apps/_register-sw.js" defer></script>
  <style>
    /* ---------- Theme tokens (light + dark via prefers-color-scheme) ---------- */
    :root {
      --bg: #f1f5f9; --bg2: #ffffff; --fg: #0f172a; --muted: #64748b;
      --card: #ffffff; --border: #e2e8f0; --accent: #6366f1; --accent-fg: #ffffff;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.05);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a; --bg2: #111c33; --fg: #e2e8f0; --muted: #94a3b8;
        --card: #1e293b; --border: #334155; --accent: #818cf8; --accent-fg: #0b1020;
        --shadow: 0 1px 3px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.3);
      }
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--fg);
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    header {
      position: sticky; top: 0; z-index: 5; background: var(--bg);
      padding: 18px 16px 10px; border-bottom: 1px solid var(--border);
    }
    h1 { margin: 0 0 2px; font-size: 22px; }
    header p { margin: 0 0 12px; color: var(--muted); font-size: 13px; }
    #search {
      width: 100%; padding: 11px 14px; font-size: 16px; border-radius: 12px;
      border: 1px solid var(--border); background: var(--card); color: var(--fg);
    }
    main { padding: 16px; max-width: 760px; margin: 0 auto; }
    h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em;
         color: var(--muted); margin: 22px 4px 10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 12px; }
    a.app {
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      padding: 16px 8px; border-radius: 16px; text-decoration: none;
      background: var(--card); color: var(--fg); border: 1px solid var(--border);
      box-shadow: var(--shadow); transition: transform .12s ease;
    }
    a.app:active { transform: scale(.95); }
    .ico { font-size: 30px; line-height: 1; }
    .name { font-size: 12px; text-align: center; }
    footer { text-align: center; color: var(--muted); font-size: 12px; padding: 30px 16px 40px; }
    .empty { color: var(--muted); text-align: center; padding: 40px 0; }
  </style>
</head>
<body>
  <header>
    <h1>📱 Mini Apps Hub</h1>
    <p>Tap an app. Add to your home screen for the full experience.</p>
    <input id="search" type="search" placeholder="Search apps…" aria-label="Search apps" />
  </header>

  <main id="main"></main>

  <footer>Works offline once installed · Made with simple HTML</footer>

  <script>
    /* ---------- App catalog (grouped by category) ---------- */
    const CATEGORIES = [
      { name: "Notes & Lists", apps: [
        { icon: "🎨", name: "Paint", file: "paint.html" },
        { icon: "📝", name: "Text Editor", file: "editor.html" },
        { icon: "✅", name: "To-Do", file: "todo.html" },
        { icon: "🛒", name: "Shopping", file: "shopping.html" },
        { icon: "📓", name: "Journal", file: "journal.html" },
      ]},
      { name: "Audio", apps: [
        { icon: "🥁", name: "Drum Machine", file: "drums.html" },
        { icon: "🎵", name: "Metronome", file: "metronome.html" },
      ]},
      { name: "Calculators", apps: [
        { icon: "➗", name: "Simple", file: "calc-simple.html" },
        { icon: "🔬", name: "Scientific", file: "calc-scientific.html" },
        { icon: "💰", name: "Financial", file: "calc-financial.html" },
        { icon: "📈", name: "Graphing", file: "calc-graphing.html" },
        { icon: "📐", name: "Units", file: "calc-units.html" },
        { icon: "🏗️", name: "Construction", file: "calc-construction.html" },
      ]},
      { name: "Timers", apps: [
        { icon: "🍅", name: "Pomodoro", file: "pomodoro.html" },
        { icon: "⏲️", name: "Countdown", file: "countdown.html" },
        { icon: "⏱️", name: "Stopwatch", file: "stopwatch.html" },
      ]},
      { name: "Health", apps: [
        { icon: "🌸", name: "Period", file: "period.html" },
        { icon: "💧", name: "Water", file: "water.html" },
        { icon: "⚖️", name: "BMI / BMR", file: "bmi.html" },
      ]},
      { name: "Tools", apps: [
        { icon: "☎️", name: "Dialer", file: "dialer.html" },
        { icon: "🌐", name: "Mini Browser", file: "browser.html" },
        { icon: "🔢", name: "Tally", file: "tally.html" },
        { icon: "🎲", name: "Dice & Coin", file: "dice.html" },
      ]},
      { name: "Tabletop", apps: [
        { icon: "🐉", name: "RPG Dice", file: "rpg-dice.html" },
      ]},
      { name: "Games", apps: [
        { icon: "🐍", name: "Snake", file: "snake.html" },
      ]},
    ];

    const main = document.getElementById("main");
    const search = document.getElementById("search");

    /* Render the catalog, optionally filtered by a search term. */
    function render(filter = "") {
      const f = filter.trim().toLowerCase();
      main.innerHTML = "";
      let shown = 0;
      for (const cat of CATEGORIES) {
        const apps = cat.apps.filter(a => a.name.toLowerCase().includes(f));
        if (!apps.length) continue;
        shown += apps.length;
        const h2 = document.createElement("h2");
        h2.textContent = cat.name;
        const grid = document.createElement("div");
        grid.className = "grid";
        for (const a of apps) {
          const link = document.createElement("a");
          link.className = "app";
          link.href = a.file;
          link.innerHTML = `<span class="ico">${a.icon}</span><span class="name">${a.name}</span>`;
          grid.appendChild(link);
        }
        main.appendChild(h2);
        main.appendChild(grid);
      }
      if (!shown) {
        const p = document.createElement("p");
        p.className = "empty";
        p.textContent = "No apps match your search.";
        main.appendChild(p);
      }
    }

    search.addEventListener("input", () => render(search.value));
    render();
  </script>
</body>
</html>
