<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Stopwatch</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <script src="/apps/_register-sw.js" defer></script>
  <style>
    :root{--bg:#f1f5f9;--fg:#0f172a;--card:#fff;--border:#e2e8f0;--accent:#0891b2;--muted:#64748b}
    @media (prefers-color-scheme:dark){:root{--bg:#0f172a;--fg:#e2e8f0;--card:#1e293b;--border:#334155;--accent:#22d3ee;--muted:#94a3b8}}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh}
    .bar{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border)}
    .bar a{color:var(--accent);text-decoration:none;font-size:15px}.bar h1{font-size:16px;margin:0;flex:1}
    main{max-width:420px;margin:0 auto;padding:20px 16px;text-align:center}
    .time{font-size:56px;font-weight:700;font-variant-numeric:tabular-nums;margin:14px 0}
    .time small{font-size:26px;color:var(--muted)}
    .row{display:flex;gap:10px;justify-content:center;margin:18px 0}
    .row button{font-size:18px;padding:14px 26px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--fg);min-width:110px}
    .row button.go{background:var(--accent);color:#fff;border-color:var(--accent)}
    ul{list-style:none;margin:14px 0;padding:0;text-align:left}
    li{display:flex;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums}
    li span{color:var(--muted)}
  </style>
</head>
<body>
  <div class="bar"><a href="index.html">← Apps</a><h1>⏱️ Stopwatch</h1></div>
  <main>
    <div class="time" id="time">00:00<small>.00</small></div>
    <div class="row">
      <button class="go" id="start">Start</button>
      <button id="lap">Lap</button>
      <button id="reset">Reset</button>
    </div>
    <ul id="laps"></ul>
  </main>

  <script>
    // Track elapsed time using timestamps so the display stays accurate even if
    // the tab throttles the interval.
    let startTime = 0, elapsed = 0, running = false, raf = null, laps = [], lastLap = 0;
    const timeEl = document.getElementById("time");

    function fmt(ms){
      const total = Math.floor(ms/10); // centiseconds
      const cs = total % 100, s = Math.floor(total/100)%60, m = Math.floor(total/6000);
      return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}<small>.${String(cs).padStart(2,"0")}</small>`;
    }
    function now(){ return performance.now(); }
    function update(){ timeEl.innerHTML = fmt(elapsed + (running ? now()-startTime : 0)); if (running) raf = requestAnimationFrame(update); }

    document.getElementById("start").onclick = (e) => {
      if (running){ elapsed += now()-startTime; running = false; cancelAnimationFrame(raf); e.target.textContent = "Start"; }
      else { startTime = now(); running = true; e.target.textContent = "Stop"; update(); }
    };
    document.getElementById("lap").onclick = () => {
      if (!running && elapsed === 0) return;
      const t = elapsed + (running ? now()-startTime : 0);
      const split = t - lastLap; lastLap = t;
      laps.unshift({ n: laps.length+1, split, total: t });
      renderLaps();
    };
    document.getElementById("reset").onclick = () => {
      running = false; cancelAnimationFrame(raf); elapsed = 0; lastLap = 0; laps = [];
      document.getElementById("start").textContent = "Start"; timeEl.innerHTML = fmt(0); renderLaps();
    };
    function plain(ms){ const total = Math.floor(ms/10); const cs = total%100, s = Math.floor(total/100)%60, m = Math.floor(total/6000);
      return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}.${String(cs).padStart(2,"0")}`; }
    function renderLaps(){
      document.getElementById("laps").innerHTML = laps.map(l =>
        `<li><span>Lap ${l.n}</span><b>${plain(l.split)}</b><span>${plain(l.total)}</span></li>`).join("");
    }
  </script>
</body>
</html>
